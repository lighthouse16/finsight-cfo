version: '3.8'

services:
  # Backend FastAPI service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: finsight-cfo-backend
    restart: always
    environment:
      - APP_MODE=production
      - ALLOW_DEMO_FALLBACK=false
      - MARKET_WATCH_USE_FIXTURES=false
      - CORS_ALLOW_ORIGINS=http://localhost,https://your-production-domain.com
      - PERSISTENCE_BACKEND=database
      - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/finsight
      - AUTH_MODE=production
      - JWT_SECRET_KEY=change-me-to-a-secure-key-in-production
      - JWT_ALGORITHM=HS256
      - QUEUE_BACKEND=redis
      - QUEUE_REDIS_URL=redis://redis:6379/0
      # Object Storage Configurations
      - OBJECT_STORAGE_BACKEND=s3
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET=finsight-cfo-assets
      - S3_ACCESS_KEY_ID=minio_access_key
      - S3_SECRET_ACCESS_KEY=minio_secret_key
      - S3_REGION=us-east-1
      - S3_SECURE=false
      - S3_FORCE_PATH_STYLE=true
      # - FX_PROVIDER=frankfurter
      # - FX_PROVIDER_BASE_URL=https://api.frankfurter.dev/v2
      # - ALPHA_VANTAGE_API_KEY=your_key
    # Note: Port 8000 does not need to be exposed to the public host since Nginx proxies traffic internally.
    # We expose it here for optional debugging or testing (remove/comment out in absolute strict private setups).
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    # depends_on:
    #   - postgres
    #   - redis

  # Frontend Nginx static server + reverse proxy
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=
    container_name: finsight-cfo-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional production PostgreSQL Database
