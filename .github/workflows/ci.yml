name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: |
          cd backend
          python -m compileall app

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Existing React Three peer dependencies are aligned by the current lockfile;
        # use legacy peer resolution until the 3D dependency stack is upgraded together.
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build
